#
# gitleaks config — extends the default ruleset.
# Use allowlists here ONLY for verified false positives (test fixtures,
# redacted examples). Real secrets must never be allowlisted.

[extend]
useDefault = true

[allowlist]
description = "Verified false positives"
paths = [
  # Test fixture strings — deterministic, never used as credentials.
  '''tests/aspect/security_test\.ts$''',
]
regexes = [
  # Placeholder patterns used in docs/examples.
  '''change_me_in_production''',
  '''your-?[a-z-]+-here''',
  '''YOUR_[A-Z_]+''',
  '''replace-with-[a-z0-9-]+''',
  '''\$\{[A-Z_]+\}''',
]
stopwords = [
  "example",
  "placeholder",
  "sample",
]
